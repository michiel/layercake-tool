on:
  release:
    types: [created]

jobs:
  release:
    name: Release - ${{ matrix.platform.os-name }}
    strategy:
      matrix:
        platform:
          - os-name: linux-x86_64
            runs-on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu

          - os-name: windows-x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc

          # - os-name: macos-x86_64
          #   runs-on: macOS-latest
          #   target: x86_64-apple-darwin

          - os-name: macos-aarch64
            runs-on: macOS-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install frontend dependencies
        run: npm run frontend:install
      # The web UI is embedded into the binary via include_dir!, so it must be
      # built BEFORE the Rust build (which reads frontend/dist at compile time).
      - name: Build web UI
        run: npm run frontend:build
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--locked --release --package layercake-cli"
          strip: true
          force-use-cross: false
      - name: Publish artifacts and release
        uses: houseabsolute/actions-rust-release@v0
        with:
          executable-name: layercake
          target: ${{ matrix.platform.target }}
          changes-file: "CHANGES.md"
          archive-name: "layercake-${{ github.event.release.tag_name }}-${{ matrix.platform.os-name }}"
